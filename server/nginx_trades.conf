server {
    listen 80;
    server_name roberttrades.com www.roberttrades.com;
    return 301 https://roberttrades.com$request_uri;
}

server {
    listen 443 ssl;
    server_name roberttrades.com www.roberttrades.com;

    ssl_certificate /etc/letsencrypt/live/roberttrades.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roberttrades.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/trades/client/dist;
    index index.html;
    client_max_body_size 20M;

    location /api {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /var/www/trades/server/public/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
